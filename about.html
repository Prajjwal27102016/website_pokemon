<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: pink;
            min-height: 100vh;
            padding: 2rem;
            padding-top: 60px;
        }

        nav {
            width: 100%;
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            background: #333;
            margin: 0;
            z-index: 100;
        }

        nav a {
            padding: 15px 20px;
            color: #1dd1a1;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        nav a:hover {
            background: #1dd1a1;
            color: #333;
        }

        nav a.about {
            background: #1dd1a1;
            color: #333;
        }

        nav a.about:hover {
            background: #17a085;
        }

        nav a.home {
            background: #ffc400;
            color: #333;
        }

        nav a.home:hover {
            background: #ffb300;
        }

        p {
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            margin: 0 auto;
        }

        .container p {
            color: #333;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="home">Home</a>
        <a href="pikachu.html">⚡ Pikachu</a>
        <a href="charizard.html">🔥 Charizard</a>
        <a href="lugia.html">🌊 Lugia</a>
        <a href="blastoise.html">💧 Blastoise</a>
        <a href="about.html" class="about">About Me</a>
    </nav>

    <div class="container">
        <h1>About Me</h1>
        <p>This is the about page of the Pokemon App. Here you can find information about the app and its features.</p>
    </div>
</body>

</html>
