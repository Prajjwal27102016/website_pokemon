<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Pokemon App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-color: #222;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Reusing your background setup */
       body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* This creates a high-tech dark gradient */
            background: radial-gradient(circle at 50% 50%, #2c3e50 0%, #1a1a1a 100%);
            /* This adds a subtle dot grid pattern to make it look like a professional dashboard */
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Navbar Styling */
        nav {
            width: 100%;
            display: flex;
            position: fixed;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        nav a {
            padding: 15px 20px;
            color: #1dd1a1;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 10px #1dd1a1;
        }

        nav a.home {
            background: #ffc400;
            color: #333;
        }

        /* Contact Page Specific Styles */
        .contact-container {
            flex: 1;
            /* Pushes the footer to the bottom */
            padding: 140px 2rem 60px;
            max-width: 700px;
            /* A bit narrower for a form */
            margin: 0 auto;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            color: #c9fff0;
            text-shadow: 0 0 10px #5d9586, 0 0 20px #1dd1a17a;
            margin-bottom: 20px;
        }

        .contact-subtitle {
            text-align: center;
            color: #eee;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        /* The Glassy Form Box */
        .form-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(192, 179, 179, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        /* Customizing Bootstrap Inputs for Dark Mode */
        .form-control {
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border-color: #1dd1a1;
            box-shadow: 0 0 10px rgba(29, 209, 161, 0.5);
        }

        /* Customizing the Placeholder text color */
        .form-control::placeholder {
            color: #bbb;
        }

        .form-label {
            font-weight: bold;
            color: #1dd1a1;
        }

        /* The Submit Button */
        .btn-submit {
            background-color: #1dd1a1;
            color: #222;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #fff;
            color: #1dd1a1;
            box-shadow: 0 0 15px #1dd1a1;
            transform: translateY(-2px);
        }

        /* Footer Styling */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            margin-top: auto;
            /* Ensures it stays at the bottom */
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="home">Home</a>
        <a href="pikachu.html">⚡ Pikachu</a>
        <a href="charizard.html">🔥 Charizard</a>
        <a href="lugia.html">🌊 Lugia</a>
        <a href="blastoise.html">🛡️ Blastoise</a>
        <a href="bulbasuar.html">🍃 Bulbasaur</a>
        <a href="about.html">About Us 📖</a>
    </nav>

    <div class="contact-container">
        <h1>Contact the Lab ✉️</h1>
        <p class="contact-subtitle">Got a question about your Pokédex or want to share your latest catch? Send Professor
            Oak a message below!</p>

        <div class="form-box">
            <form action="#" method="POST">

                <div class="mb-3">
                    <label for="name" class="form-label">Trainer Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Ash Ketchum" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Rotom Phone Email</label>
                    <input type="email" class="form-control" id="email" placeholder="ash@pallettown.com" required>
                </div>

                <div class="mb-3">
                    <label for="fav-pokemon" class="form-label">Favorite Pokémon</label>
                    <input type="text" class="form-control" id="fav-pokemon" placeholder="e.g., Gengar">
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="I want to be the very best..."
                        required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message 🚀</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 My Awesome Website</p>
        <a href="contact.html" style="color: #1dd1a1; text-decoration: none; font-weight: bold;">Contact Us</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
