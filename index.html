<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .banner-img {
            width: 100%;
            max-width: 1000px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin: 2rem 0;
            display: block;
        }

        h1 {
            display: none;
        }

        .welcome-text {
            display: none;
        }

        .pokemon-links {
            display: none;
        }

        .pokemon-btn {
            padding: 12px 24px;
            font-size: 1rem;
            color: white;
            background: #ff6b6b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .pokemon-btn:hover {
            background: #ee5a52;
            transform: scale(1.05);
        }

        .pokemon-btn.charizard {
            background: #ff9800;
        }

        .pokemon-btn.charizard:hover {
            background: #e68900;
        }

        .pokemon-btn.pikachu {
            background: #ffc400;
            color: #333;
        }

        .pokemon-btn.pikachu:hover {
            background: #ffb300;
        }

        .pokemon-btn.lugia {
            background: #2196f3;
        }

        .pokemon-btn.lugia:hover {
            background: #0b7dda;
        }

        nav {
            width: 100%;
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            background: #333;
            margin: 0;
        }

        nav a {
            padding: 15px 20px;
            color: #1dd1a1;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        nav a:hover {
            background: #1dd1a1;
            color: #333;
        }

        nav a.home {
            background: #ffc400;
            color: #333;
        }

        nav a.home:hover {
            background: #ffb300;
        }

        body {
            padding-top: 60px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="home">Home</a>
        <a href="pikachu.html">⚡ Pikachu</a>
        <a href="charizard.html">🔥 Charizard</a>
        <a href="lugia.html">🌊 Lugia</a>
        <a href="blastoise.html">💧 Blastoise</a>
        <a href="about.html">About Me</a>
        <a href="contact.html">Contact</a>
    </nav>
<div class="container">
    <h1>Welcome to Pokemon World!</h1>
    <p class="welcome-text">Choose your favorite Pokemon to learn more</p>

    <img src="image.png" alt="Pokemon surfing" class="banner-img">

    <div class="pokemon-links">
            <a href="pikachu.html" class="pokemon-btn pikachu">⚡ Pikachu</a>
            <a href="charizard.html" class="pokemon-btn charizard">🔥 Charizard</a>
            <a href="lugia.html" class="pokemon-btn lugia">🌊 Lugia</a>
        </div>
    </div>
</body>

</html>
